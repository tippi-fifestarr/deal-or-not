specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: PredictionMarket
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000" # TODO: Replace with deployed address
      abi: PredictionMarket
      startBlock: 0 # TODO: Replace with deployment block
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - Bet
        - User
        - GlobalStats
      abis:
        - name: PredictionMarket
          file: ./abis/PredictionMarket.json
      eventHandlers:
        - event: MarketCreated(indexed uint256,indexed uint256,uint8,uint256)
          handler: handleMarketCreated
        - event: BetPlaced(indexed uint256,indexed address,bool,uint256,uint256)
          handler: handleBetPlaced
        - event: MarketResolved(indexed uint256,bool,uint256,uint256)
          handler: handleMarketResolved
        - event: PayoutClaimed(indexed uint256,indexed address,uint256)
          handler: handlePayoutClaimed
      file: ./src/prediction-market.ts

  - kind: ethereum
    name: AgentRegistry
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000" # TODO: Replace with deployed address
      abi: AgentRegistry
      startBlock: 0 # TODO: Replace with deployment block
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Agent
      abis:
        - name: AgentRegistry
          file: ./abis/AgentRegistry.json
      eventHandlers:
        - event: AgentRegistered(indexed uint256,indexed address,string,string)
          handler: handleAgentRegistered
      file: ./src/agent-registry.ts
